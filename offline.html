<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmore Social — Offline</title>
  <meta name="theme-color" content="#173f35">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <style>
    :root{--forest:#173f35;--cream:#fff8ea;--paper:#fffdf8;--brown:#5e3a22;--muted:#6d766f;--line:rgba(23,63,53,.14)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:1rem;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--forest);background:linear-gradient(180deg,#fff8ea,#f3ecdf)}
    main{width:min(32rem,100%);padding:1.25rem;background:var(--paper);border:1px solid var(--line);border-radius:1rem;box-shadow:0 16px 46px rgba(23,63,53,.11)}
    img{display:block;width:min(15rem,70%);height:auto;margin:0 0 1rem}
    h1{margin:.2rem 0 .65rem;font-size:clamp(2rem,10vw,3.25rem);line-height:1;letter-spacing:0}
    p{margin:0;color:var(--muted);line-height:1.5}
    a{display:inline-flex;margin-top:1rem;color:var(--brown);font-weight:700}
  </style>
</head>
<body>
  <main>
    <img src="./TEXT-BROWN.png" alt="Anmore Social">
    <h1>Offline</h1>
    <p>Anmore Social is installed, but the live community feed needs a connection. Reopen the app when you are back online and your saved calendar will load first.</p>
    <a href="./">Try again</a>
  </main>
</body>
</html>
